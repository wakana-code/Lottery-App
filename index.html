<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 派手なルーレット 🎰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff, 0 0 80px #00ffff; }
        }

        .roulette-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 30px;
        }

        .roulette-border {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: conic-gradient(
                #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8800ff, #ff00ff, #ff0000
            );
            animation: borderSpin 4s linear infinite;
            z-index: 1;
        }

        @keyframes borderSpin {
            to { transform: rotate(360deg); }
        }

        .roulette-inner-bg {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 384px;
            height: 384px;
            border-radius: 50%;
            background: #1a1a3e;
            z-index: 2;
        }

        canvas {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 3;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 50px;
            filter: drop-shadow(0 0 10px #ff0000);
            animation: pointerPulse 1s ease-in-out infinite;
        }

        @keyframes pointerPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #ddd);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        #spinBtn {
            padding: 18px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff0080, #ff8c00, #ff0080);
            background-size: 200% 200%;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.6), 0 5px 15px rgba(0,0,0,0.3);
            animation: btnGlow 2s ease-in-out infinite;
            transition: transform 0.2s;
            letter-spacing: 3px;
        }

        #spinBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 0, 128, 0.8), 0 5px 25px rgba(0,0,0,0.5);
        }

        #spinBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        @keyframes btnGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* パーティクル背景 */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        /* 結果モーダル */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .result-overlay.show {
            display: flex;
        }

        .result-box {
            text-align: center;
            padding: 50px 80px;
            border-radius: 30px;
            animation: resultAppear 0.5s ease-out;
            position: relative;
        }

        @keyframes resultAppear {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .result-box.gold {
            background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700);
            box-shadow: 0 0 80px #ffd700, 0 0 150px #ffd700;
        }

        .result-box.silver {
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8, #c0c0c0);
            box-shadow: 0 0 60px #c0c0c0, 0 0 100px #c0c0c0;
        }

        .result-box.special {
            background: linear-gradient(135deg, #ff00ff, #8800ff, #00ffff, #ff00ff);
            background-size: 300% 300%;
            animation: resultAppear 0.5s ease-out, rainbowBg 2s ease-in-out infinite;
            box-shadow: 0 0 80px #ff00ff, 0 0 150px #8800ff;
        }

        @keyframes rainbowBg {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .result-box.bronze {
            background: linear-gradient(135deg, #cd7f32, #e8a860, #cd7f32);
            box-shadow: 0 0 40px #cd7f32, 0 0 80px #cd7f32;
        }

        .result-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 15px;
            animation: emojiDance 0.5s ease-in-out infinite alternate;
        }

        @keyframes emojiDance {
            from { transform: scale(1) rotate(-5deg); }
            to { transform: scale(1.15) rotate(5deg); }
        }

        .result-text {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .result-sub {
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
            margin-bottom: 25px;
        }

        .result-close {
            padding: 12px 40px;
            font-size: 1.1em;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .result-close:hover {
            background: rgba(255,255,255,0.4);
        }

        /* 花火エフェクト */
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 99;
        }

        .firework-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fireworkBurst 1.2s ease-out forwards;
        }

        @keyframes fireworkBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* ルーレット光エフェクト */
        .light-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 440px;
            height: 440px;
            border-radius: 50%;
            z-index: 0;
        }

        .light-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            animation: lightBlink 0.5s ease-in-out infinite alternate;
        }

        @keyframes lightBlink {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* スピン中のフラッシュ */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            animation: flashAnim 0.3s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 確率表示 */
        .prob-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .prob-item {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            color: white;
            font-weight: bold;
        }

        .prob-gold { background: linear-gradient(135deg, #ffd700, #ff8c00); }
        .prob-silver { background: linear-gradient(135deg, #a0a0a0, #c0c0c0); }
        .prob-special { background: linear-gradient(135deg, #ff00ff, #8800ff); }
        .prob-bronze { background: linear-gradient(135deg, #cd7f32, #a0622e); }

        /* 紙吹雪 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 101;
            pointer-events: none;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(1080deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 SUPER ROULETTE 🎰</h1>
        <div class="roulette-wrapper">
            <div class="roulette-border"></div>
            <div class="roulette-inner-bg"></div>
            <div class="pointer">🔻</div>
            <canvas id="wheel" width="370" height="370"></canvas>
            <div class="center-circle">🎯</div>
            <div class="light-ring" id="lightRing"></div>
        </div>
        <button id="spinBtn" onclick="spin()">🎲 SPIN! 🎲</button>
        <div class="prob-display">
            <span class="prob-item prob-gold">🥇 金賞 10%</span>
            <span class="prob-item prob-silver">🥈 銀賞 30%</span>
            <span class="prob-item prob-special">⭐ 特別賞 10%</span>
            <span class="prob-item prob-bronze">🥉 銅賞 50%</span>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box" id="resultBox">
            <span class="result-emoji" id="resultEmoji"></span>
            <div class="result-text" id="resultText"></div>
            <div class="result-sub" id="resultSub"></div>
            <button class="result-close" onclick="closeResult()">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 170;

        // セグメント定義 (角度の割合で配置)
        // 銅賞50%, 銀賞30%, 金賞10%, 特別賞10%
        // 視覚的に交互に配置するためセグメントを分割
        const segments = [
            { label: '銅賞', color1: '#cd7f32', color2: '#a0622e', emoji: '🥉', angle: 36 },
            { label: '銀賞', color1: '#b8b8b8', color2: '#8a8a8a', emoji: '🥈', angle: 36 },
            { label: '銅賞', color1: '#d4893c', color2: '#b07030', emoji: '🥉', angle: 36 },
            { label: '金賞', color1: '#ffd700', color2: '#ff8c00', emoji: '🥇', angle: 36 },
            { label: '銅賞', color1: '#cd7f32', color2: '#a0622e', emoji: '🥉', angle: 36 },
            { label: '銀賞', color1: '#c0c0c0', color2: '#909090', emoji: '🥈', angle: 36 },
            { label: '銅賞', color1: '#d4893c', color2: '#b07030', emoji: '🥉', angle: 36 },
            { label: '特別賞', color1: '#ff00ff', color2: '#8800ff', emoji: '⭐', angle: 36 },
            { label: '銅賞', color1: '#cd7f32', color2: '#a0622e', emoji: '🥉', angle: 36 },
            { label: '銀賞', color1: '#b0b0b0', color2: '#888', emoji: '🥈', angle: 36 },
        ];

        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel(rotation) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);

            let startAngle = 0;
            segments.forEach((seg, i) => {
                const sliceAngle = (seg.angle * Math.PI) / 180;
                const endAngle = startAngle + sliceAngle;

                // グラデーション
                const grad = ctx.createRadialGradient(0, 0, 20, 0, 0, radius);
                grad.addColorStop(0, seg.color1);
                grad.addColorStop(1, seg.color2);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();

                // 境界線
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // テキスト
                ctx.save();
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(seg.emoji, radius * 0.6, 5);
                ctx.font = 'bold 12px Arial';
                ctx.fillText(seg.label, radius * 0.8, 5);
                ctx.restore();

                startAngle = endAngle;
            });

            ctx.restore();
        }

        function createBackgroundParticles() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const size = Math.random() * 6 + 2;
                    const colors = ['#ff0080', '#00ffff', '#ffd700', '#ff4444', '#44ff44', '#ff00ff'];
                    p.style.width = size + 'px';
                    p.style.height = size + 'px';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.background = colors[Math.floor(Math.random() * colors.length)];
                    p.style.animationDuration = (Math.random() * 5 + 4) + 's';
                    p.style.animationDelay = (Math.random() * 3) + 's';
                    document.body.appendChild(p);
                    p.addEventListener('animationiteration', () => {
                        p.style.left = Math.random() * 100 + 'vw';
                    });
                }, i * 200);
            }
        }

        function createLightDots() {
            const ring = document.getElementById('lightRing');
            for (let i = 0; i < 24; i++) {
                const dot = document.createElement('div');
                dot.className = 'light-dot';
                const angle = (i / 24) * Math.PI * 2;
                const r = 215;
                dot.style.left = (220 + Math.cos(angle) * r - 5) + 'px';
                dot.style.top = (220 + Math.sin(angle) * r - 5) + 'px';
                dot.style.animationDelay = (i * 0.1) + 's';
                const colors = ['#ff0000', '#ffff00', '#00ff00', '#00ffff', '#ff00ff', '#ffd700'];
                dot.style.background = colors[i % colors.length];
                dot.style.boxShadow = `0 0 8px ${colors[i % colors.length]}`;
                ring.appendChild(dot);
            }
        }

        function determineResult() {
            const rand = Math.random() * 100;
            if (rand < 10) return { label: '金賞', class: 'gold', emoji: '👑🥇🏆', sub: 'おめでとうございます！！', text: '🎉 金賞 🎉' };
            if (rand < 40) return { label: '銀賞', class: 'silver', emoji: '🥈✨', sub: 'すばらしい！', text: '🎊 銀賞 🎊' };
            if (rand < 50) return { label: '特別賞', class: 'special', emoji: '🌟⭐💫', sub: 'スペシャル！！！', text: '🌈 特別賞 🌈' };
            return { label: '銅賞', class: 'bronze', emoji: '🥉🎉', sub: 'おめでとう！', text: '🎈 銅賞 🎈' };
        }

        function getSegmentIndex(label) {
            const indices = [];
            segments.forEach((s, i) => {
                if (s.label === label) indices.push(i);
            });
            return indices[Math.floor(Math.random() * indices.length)];
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const result = determineResult();
            const segIndex = getSegmentIndex(result.label);

            // ターゲット角度を計算（ポインターは上にある = -π/2）
            const segAngle = 36; // 各セグメントの角度
            const targetSegCenter = segIndex * segAngle + segAngle / 2;
            // ポインターは上（270度 = -90度の位置）
            // ホイールは時計回りに回転するので、ターゲットが上に来るように
            const targetDeg = 360 - targetSegCenter + 270;
            const fullSpins = Math.floor(Math.random() * 3 + 6) * 360; // 6-8回転
            const totalRotation = fullSpins + targetDeg;
            const totalRotationRad = (totalRotation * Math.PI) / 180;

            const startRotation = currentRotation;
            const duration = 5000 + Math.random() * 2000;
            const startTime = performance.now();

            // チックサウンドの代わりに視覚エフェクト
            let lastSegment = -1;

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // イージング (cubic ease-out with bounce feel)
                const eased = 1 - Math.pow(1 - progress, 4);
                
                currentRotation = startRotation + totalRotationRad * eased;
                drawWheel(currentRotation);

                // セグメント変化時のフラッシュ
                const currentDeg = ((currentRotation * 180 / Math.PI) % 360 + 360) % 360;
                const currentSeg = Math.floor(currentDeg / 36) % 10;
                if (currentSeg !== lastSegment && progress < 0.9) {
                    lastSegment = currentSeg;
                    // 軽いパルスエフェクト
                    canvas.style.filter = `drop-shadow(0 0 ${20 + Math.random() * 15}px rgba(255, 255, 255, ${0.5 - progress * 0.4}))`;
                }

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.style.filter = 'drop-shadow(0 0 15px rgba(255, 255, 255, 0.3))';
                    showResult(result);
                }
            }

            requestAnimationFrame(animate);
        }

        function showResult(result) {
            // フラッシュ
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);

            setTimeout(() => {
                const overlay = document.getElementById('resultOverlay');
                const box = document.getElementById('resultBox');
                const emoji = document.getElementById('resultEmoji');
                const text = document.getElementById('resultText');
                const sub = document.getElementById('resultSub');

                box.className = 'result-box ' + result.class;
                emoji.textContent = result.emoji;
                text.textContent = result.text;
                sub.textContent = result.sub;
                overlay.classList.add('show');

                // 花火
                launchFireworks(result.class === 'gold' || result.class === 'special' ? 8 : 3);

                // 紙吹雪
                if (result.class === 'gold' || result.class === 'special') {
                    launchConfetti(80);
                } else {
                    launchConfetti(30);
                }
            }, 300);
        }

        function launchFireworks(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth,
                        Math.random() * window.innerHeight * 0.6
                    );
                }, i * 300);
            }
        }

        function createFirework(x, y) {
            const container = document.createElement('div');
            container.className = 'firework';
            container.style.left = x + 'px';
            container.style.top = y + 'px';
            document.body.appendChild(container);

            const colors = ['#ff0000', '#ffd700', '#00ff00', '#00ffff', '#ff00ff', '#ffaa00', '#ff4488'];
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                const angle = (i / particleCount) * Math.PI * 2;
                const dist = 80 + Math.random() * 80;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.boxShadow = `0 0 6px ${p.style.background}`;
                container.appendChild(p);
            }

            setTimeout(() => container.remove(), 1500);
        }

        function launchConfetti(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    c.style.top = '-10px';
                    c.style.width = (Math.random() * 10 + 5) + 'px';
                    c.style.height = (Math.random() * 10 + 5) + 'px';
                    const shapes = ['50%', '0%'];
                    c.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                    const colors = ['#ff0000', '#ffd700', '#00ff00', '#00aaff', '#ff00ff', '#ffaa00', '#ff6699', '#aaffaa'];
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4000);
                }, i * 30);
            }
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
        }

        // 初期化
        drawWheel(0);
        createBackgroundParticles();
        createLightDots();
    </script>
</body>
</html>
