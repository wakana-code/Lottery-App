<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 派手なルーレット 🎰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container { text-align: center; position: relative; z-index: 10; }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff, 0 0 80px #00ffff; }
        }

        .roulette-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 0 auto 30px;
        }

        .roulette-border {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: conic-gradient(#ff0000,#ff7700,#ffff00,#00ff00,#0077ff,#8800ff,#ff00ff,#ff0000);
            animation: borderSpin 4s linear infinite;
            z-index: 1;
        }

        @keyframes borderSpin { to { transform: rotate(360deg); } }

        .roulette-inner-bg {
            position: absolute;
            top: 8px; left: 8px;
            width: 384px; height: 384px;
            border-radius: 50%;
            background: #1a1a3e;
            z-index: 2;
        }

        canvas {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 3;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0; height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 40px solid #ff0000;
            filter: drop-shadow(0 0 10px #ff0000) drop-shadow(0 0 20px #ff4444);
            animation: pointerPulse 1s ease-in-out infinite;
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -42px; left: -12px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 10px solid #ff4444;
        }

        @keyframes pointerPulse {
            0%,100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.15); }
        }

        .center-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle,#fff,#ddd);
            z-index: 5;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        #spinBtn {
            padding: 18px 60px;
            font-size: 1.5em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg,#ff0080,#ff8c00,#ff0080);
            background-size: 200% 200%;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 30px rgba(255,0,128,0.6), 0 5px 15px rgba(0,0,0,0.3);
            animation: btnGlow 2s ease-in-out infinite;
            transition: transform 0.2s;
            letter-spacing: 3px;
        }

        #spinBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255,0,128,0.8), 0 5px 25px rgba(0,0,0,0.5);
        }

        #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: scale(1); }

        @keyframes btnGlow {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .result-overlay.show { display: flex; }

        .result-box {
            text-align: center;
            padding: 50px 80px;
            border-radius: 30px;
            animation: resultAppear 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
            position: relative;
        }

        @keyframes resultAppear {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .result-box.gold {
            background: linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);
            box-shadow: 0 0 80px #ffd700, 0 0 150px #ffd700;
        }

        .result-box.silver {
            background: linear-gradient(135deg,#c0c0c0,#e8e8e8,#c0c0c0);
            box-shadow: 0 0 60px #c0c0c0, 0 0 100px #c0c0c0;
        }

        .result-box.special {
            background: linear-gradient(135deg,#ff00ff,#8800ff,#00ffff,#ff00ff);
            background-size: 300% 300%;
            animation: resultAppear 0.6s cubic-bezier(0.175,0.885,0.32,1.275), rainbowBg 2s ease-in-out infinite;
            box-shadow: 0 0 80px #ff00ff, 0 0 150px #8800ff;
        }

        @keyframes rainbowBg {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .result-box.bronze {
            background: linear-gradient(135deg,#cd7f32,#e8a860,#cd7f32);
            box-shadow: 0 0 40px #cd7f32, 0 0 80px #cd7f32;
        }

        .result-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 15px;
            animation: emojiDance 0.5s ease-in-out infinite alternate;
        }

        @keyframes emojiDance {
            from { transform: scale(1) rotate(-5deg); }
            to { transform: scale(1.15) rotate(5deg); }
        }

        .result-text {
            font-size: 3em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }

        .result-sub {
            font-size: 1.2em;
            color: rgba(255,255,255,0.9);
            margin-bottom: 25px;
        }

        .result-close {
            padding: 12px 40px;
            font-size: 1.1em;
            border: 2px solid white;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .result-close:hover { background: rgba(255,255,255,0.4); }

        .firework { position: fixed; pointer-events: none; z-index: 99; }

        .firework-particle {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            animation: fireworkBurst 1.2s ease-out forwards;
        }

        @keyframes fireworkBurst {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
        }

        .light-ring {
            position: absolute;
            top: -20px; left: -20px;
            width: 440px; height: 440px;
            border-radius: 50%;
            z-index: 0;
        }

        .light-dot {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #fff;
            animation: lightBlink 0.5s ease-in-out infinite alternate;
        }

        @keyframes lightBlink {
            from { opacity: 0.3; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        .flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 90;
            pointer-events: none;
            animation: flashAnim 0.3s ease-out forwards;
        }

        @keyframes flashAnim {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .prob-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .prob-item {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            color: white;
            font-weight: bold;
        }

        .prob-gold { background: linear-gradient(135deg,#ffd700,#ff8c00); }
        .prob-silver { background: linear-gradient(135deg,#a0a0a0,#c0c0c0); }
        .prob-special { background: linear-gradient(135deg,#ff00ff,#8800ff); }
        .prob-bronze { background: linear-gradient(135deg,#cd7f32,#a0622e); }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(1080deg); opacity: 0; }
        }

        /* スピン中の揺れ演出 */
        @keyframes shakePointer {
            0%,100% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(6deg); }
            75% { transform: translateX(-50%) rotate(-6deg); }
        }

        #debugInfo {
            color: rgba(255,255,255,0.4);
            font-size: 0.7em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 SUPER ROULETTE 🎰</h1>
        <div class="roulette-wrapper">
            <div class="roulette-border"></div>
            <div class="roulette-inner-bg"></div>
            <div class="pointer" id="pointer"></div>
            <canvas id="wheel" width="370" height="370"></canvas>
            <div class="center-circle">🎯</div>
            <div class="light-ring" id="lightRing"></div>
        </div>
        <button id="spinBtn" onclick="spin()">🎲 SPIN! 🎲</button>
        <div class="prob-display">
            <span class="prob-item prob-gold">🥇 金賞 10%</span>
            <span class="prob-item prob-silver">🥈 銀賞 30%</span>
            <span class="prob-item prob-special">⭐ 特別賞 10%</span>
            <span class="prob-item prob-bronze">🥉 銅賞 50%</span>
        </div>
        <div id="debugInfo"></div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box" id="resultBox">
            <span class="result-emoji" id="resultEmoji"></span>
            <div class="result-text" id="resultText"></div>
            <div class="result-sub" id="resultSub"></div>
            <button class="result-close" onclick="closeResult()">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 170;

        const segments = [
            { label: '銅賞',  color1: '#cd7f32', color2: '#9a5e22', emoji: '🥉' },
            { label: '銀賞',  color1: '#b8b8b8', color2: '#7a7a7a', emoji: '🥈' },
            { label: '銅賞',  color1: '#d4893c', color2: '#a06828', emoji: '🥉' },
            { label: '金賞',  color1: '#ffd700', color2: '#cc8800', emoji: '🥇' },
            { label: '銅賞',  color1: '#cd7f32', color2: '#9a5e22', emoji: '🥉' },
            { label: '銀賞',  color1: '#c0c0c0', color2: '#808080', emoji: '🥈' },
            { label: '銅賞',  color1: '#d4893c', color2: '#a06828', emoji: '🥉' },
            { label: '特別賞', color1: '#ff00ff', color2: '#7700bb', emoji: '⭐' },
            { label: '銅賞',  color1: '#cd7f32', color2: '#9a5e22', emoji: '🥉' },
            { label: '銀賞',  color1: '#b0b0b0', color2: '#757575', emoji: '🥈' },
        ];

        const SEG_DEG = 36;
        const SEG_COUNT = 10;
        let currentRotation = 0;
        let isSpinning = false;

        /* ---- ホイール描画 ---- */
        function drawWheel(rotation) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation);

            let startAngle = 0;
            segments.forEach((seg) => {
                const slice = (SEG_DEG * Math.PI) / 180;
                const endAngle = startAngle + slice;
                const grad = ctx.createRadialGradient(0, 0, 30, 0, 0, radius);
                grad.addColorStop(0, seg.color1);
                grad.addColorStop(1, seg.color2);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.rotate(startAngle + slice / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 5;
                ctx.font = 'bold 22px Arial';
                ctx.fillText(seg.emoji, radius * 0.55, 7);
                ctx.font = 'bold 13px Arial';
                ctx.fillText(seg.label, radius * 0.8, 5);
                ctx.restore();

                startAngle = endAngle;
            });
            ctx.restore();
        }

        /* ---- ポインターの位置からセグメント番号を取得 ---- */
        function getSegmentAtPointer(rotRad) {
            const rotDeg = ((rotRad * 180 / Math.PI) % 360 + 360) % 360;
            const pointerInWheel = ((270 - rotDeg) % 360 + 360) % 360;
            return Math.floor(pointerInWheel / SEG_DEG) % SEG_COUNT;
        }

        /* ---- 当選決定 (確率通り) ---- */
        function determineResult() {
            const r = Math.random() * 100;
            if (r < 10) return { label: '金賞',  cls: 'gold',    emoji: '👑🥇🏆', sub: 'おめでとうございます！！', text: '🎉 金賞 🎉' };
            if (r < 40) return { label: '銀賞',  cls: 'silver',  emoji: '🥈✨',   sub: 'すばらしい！',           text: '🎊 銀賞 🎊' };
            if (r < 50) return { label: '特別賞', cls: 'special', emoji: '🌟⭐💫', sub: 'スペシャル！！！',       text: '🌈 特別賞 🌈' };
            return                { label: '銅賞',  cls: 'bronze',  emoji: '🥉🎉',   sub: 'おめでとう！',           text: '🎈 銅賞 🎈' };
        }

        /* ---- 該当ラベルのセグメントインデックスをランダムに1つ返す ---- */
        function pickSegIndex(label) {
            const arr = [];
            segments.forEach((s, i) => { if (s.label === label) arr.push(i); });
            return arr[Math.floor(Math.random() * arr.length)];
        }

        /* ---- スピン ---- */
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const result = determineResult();
            const segIdx = pickSegIndex(result.label);

            // セグメント segIdx の中心がポインター (270°) に来る回転角を求める
            // ホイール座標でセグメント中心 = segIdx * 36 + 18 (度)
            // ポインターはキャンバス 270° → ホイール座標 = 270 - R
            // 270 - R = segIdx*36 + 18  →  R = 252 - segIdx*36
            const perfectDeg = ((252 - segIdx * SEG_DEG) % 360 + 360) % 360;

            // セグメント内でランダムにずらす (端から3°はマージン)
            const margin = 3;
            const offsetInSeg = (Math.random() - 0.5) * (SEG_DEG - margin * 2);
            let targetDeg = ((perfectDeg + offsetInSeg) % 360 + 360) % 360;

            // 現在の角度 (度)
            const curDeg = ((currentRotation * 180 / Math.PI) % 360 + 360) % 360;

            // 追加回転量
            let delta = targetDeg - curDeg;
            if (delta < 0) delta += 360;

            const fullSpins = (Math.floor(Math.random() * 3) + 7) * 360;
            const totalDeltaRad = ((fullSpins + delta) * Math.PI) / 180;

            const startRot = currentRotation;
            const duration = 5500 + Math.random() * 2000;
            const startTime = performance.now();
            let lastSeg = -1;
            const pointer = document.getElementById('pointer');

            function animate(now) {
                const elapsed = now - startTime;
                const t = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - t, 4);

                currentRotation = startRot + totalDeltaRad * eased;
                drawWheel(currentRotation);

                // セグメントが変わるたびにポインターを揺らす
                const seg = getSegmentAtPointer(currentRotation);
                if (seg !== lastSeg) {
                    lastSeg = seg;
                    if (t < 0.92) {
                        pointer.style.animation = 'none';
                        void pointer.offsetWidth;
                        pointer.style.animation = 'shakePointer 0.08s ease';
                    }
                    if (t < 0.7) {
                        canvas.style.filter =
                            `drop-shadow(0 0 ${18 + Math.random() * 12}px rgba(255,255,255,${0.6 - t * 0.5}))`;
                    }
                }

                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    pointer.style.animation = 'pointerPulse 1s ease-in-out infinite';
                    canvas.style.filter = 'drop-shadow(0 0 15px rgba(255,255,255,0.3))';

                    // 最終確認 — ポインター直下のセグメントを読み取って表示
                    const landedIdx = getSegmentAtPointer(currentRotation);
                    const landed = segments[landedIdx];
                    document.getElementById('debugInfo').textContent =
                        `▼ が指しているマス: ${landed.emoji} ${landed.label}`;

                    showResult(result);
                }
            }
            requestAnimationFrame(animate);
        }

        /* ---- 結果表示 ---- */
        function showResult(result) {
            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            setTimeout(() => {
                document.getElementById('resultBox').className = 'result-box ' + result.cls;
                document.getElementById('resultEmoji').textContent = result.emoji;
                document.getElementById('resultText').textContent = result.text;
                document.getElementById('resultSub').textContent = result.sub;
                document.getElementById('resultOverlay').classList.add('show');

                const big = (result.cls === 'gold' || result.cls === 'special');
                launchFireworks(big ? 10 : 3);
                launchConfetti(big ? 100 : 30);
            }, 350);
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;
        }

        /* ---- 花火 ---- */
        function launchFireworks(n) {
            for (let i = 0; i < n; i++) {
                setTimeout(() => createFirework(
                    Math.random() * innerWidth,
                    Math.random() * innerHeight * 0.6
                ), i * 300);
            }
        }

        function createFirework(x, y) {
            const c = document.createElement('div');
            c.className = 'firework';
            c.style.left = x + 'px';
            c.style.top = y + 'px';
            document.body.appendChild(c);
            const cols = ['#ff0000','#ffd700','#00ff00','#00ffff','#ff00ff','#ffaa00','#ff4488'];
            for (let i = 0; i < 32; i++) {
                const p = document.createElement('div');
                p.className = 'firework-particle';
                const a = (i / 32) * Math.PI * 2;
                const d = 80 + Math.random() * 80;
                p.style.setProperty('--tx', Math.cos(a) * d + 'px');
                p.style.setProperty('--ty', Math.sin(a) * d + 'px');
                p.style.background = cols[Math.floor(Math.random() * cols.length)];
                p.style.boxShadow = `0 0 6px ${p.style.background}`;
                c.appendChild(p);
            }
            setTimeout(() => c.remove(), 1500);
        }

        /* ---- 紙吹雪 ---- */
        function launchConfetti(n) {
            for (let i = 0; i < n; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    c.style.left = Math.random() * 100 + 'vw';
                    const s = Math.random() * 10 + 5;
                    c.style.width = s + 'px';
                    c.style.height = s + 'px';
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    const cols = ['#ff0000','#ffd700','#00ff00','#00aaff','#ff00ff','#ffaa00','#ff6699','#aaffaa'];
                    c.style.background = cols[Math.floor(Math.random() * cols.length)];
                    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 4500);
                }, i * 25);
            }
        }

        /* ---- 背景パーティクル ---- */
        function createBgParticles() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    const s = Math.random() * 6 + 2;
                    const cols = ['#ff0080','#00ffff','#ffd700','#ff4444','#44ff44','#ff00ff'];
                    p.style.width = s + 'px';
                    p.style.height = s + 'px';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.background = cols[Math.floor(Math.random() * cols.length)];
                    p.style.animationDuration = (Math.random() * 5 + 4) + 's';
                    p.style.animationDelay = (Math.random() * 3) + 's';
                    document.body.appendChild(p);
                }, i * 200);
            }
        }

        /* ---- 電飾ドット ---- */
        function createLightDots() {
            const ring = document.getElementById('lightRing');
            for (let i = 0; i < 24; i++) {
                const d = document.createElement('div');
                d.className = 'light-dot';
                const a = (i / 24) * Math.PI * 2;
                const r = 215;
                d.style.left = (220 + Math.cos(a) * r - 5) + 'px';
                d.style.top  = (220 + Math.sin(a) * r - 5) + 'px';
                d.style.animationDelay = (i * 0.1) + 's';
                const cols = ['#ff0000','#ffff00','#00ff00','#00ffff','#ff00ff','#ffd700'];
                d.style.background = cols[i % cols.length];
                d.style.boxShadow = `0 0 8px ${cols[i % cols.length]}`;
                ring.appendChild(d);
            }
        }

        /* ---- 初期化 ---- */
        drawWheel(0);
        createBgParticles();
        createLightDots();
    </script>
</body>
</html>
