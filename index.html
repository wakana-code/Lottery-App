<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎊 ガラガラ福引き抽選器 🎊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    color: #ffd700;
    font-size: 2em;
    margin-bottom: 5px;
    text-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00;
    animation: glow 2s ease-in-out infinite alternate;
  }

  @keyframes glow {
    from { text-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00; }
    to { text-shadow: 0 0 25px #ffd700, 0 0 50px #ff8c00, 0 0 70px #ff4500; }
  }

  .sub { color: #ccc; margin-bottom: 25px; font-size: 0.95em; }

  /* ===== 抽選器本体 ===== */
  .galagala {
    position: relative;
    width: 320px;
    height: 420px;
    margin-bottom: 15px;
  }

  /* 台座 */
  .stand {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 30px;
    background: linear-gradient(to bottom, #8B5E3C, #6B3A1F);
    border-radius: 5px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }

  .stand-leg-l, .stand-leg-r {
    position: absolute;
    bottom: 30px;
    width: 14px;
    height: 60px;
    background: linear-gradient(to right, #7B4E2C, #9B6E4C, #7B4E2C);
    border-radius: 3px;
  }
  .stand-leg-l { left: 110px; }
  .stand-leg-r { right: 110px; }

  /* 木箱（六角形っぽい八角形の回転する箱） */
  .box-container {
    position: absolute;
    top: 55px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
  }

  .box {
    width: 160px;
    height: 160px;
    position: relative;
    transform-origin: center center;
    transition: transform 0.1s;
  }

  .box-body {
    position: absolute;
    top: 10px; left: 10px;
    width: 140px;
    height: 140px;
    background: linear-gradient(145deg, #d4a055, #b8862d, #9a6b20);
    border-radius: 18px;
    border: 4px solid #6B3A1F;
    box-shadow:
      inset 0 0 20px rgba(0,0,0,0.3),
      0 5px 20px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  /* 木目模様 */
  .box-body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 12px,
      rgba(0,0,0,0.06) 12px,
      rgba(0,0,0,0.06) 14px
    );
  }

  .box-body::after {
    content: '福';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3em;
    color: #8b0000;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    opacity: 0.7;
  }

  /* 金属の帯 */
  .band-h {
    position: absolute;
    top: 50%; left: 10px;
    transform: translateY(-50%);
    width: 140px; height: 10px;
    background: linear-gradient(to bottom, #ddd, #888, #ddd);
    border-radius: 2px;
    z-index: 2;
  }

  .band-v {
    position: absolute;
    left: 50%; top: 10px;
    transform: translateX(-50%);
    width: 10px; height: 140px;
    background: linear-gradient(to right, #ddd, #888, #ddd);
    border-radius: 2px;
    z-index: 2;
  }

  /* ハンドル */
  .handle-axis {
    position: absolute;
    top: 50%;
    right: -55px;
    transform: translateY(-50%);
    width: 55px;
    height: 8px;
    background: linear-gradient(to bottom, #bbb, #777);
    border-radius: 3px;
    z-index: 3;
    transform-origin: left center;
  }

  .handle-knob {
    position: absolute;
    right: -14px;
    top: -10px;
    width: 28px;
    height: 28px;
    background: radial-gradient(circle at 35% 35%, #ff4444, #cc0000, #880000);
    border-radius: 50%;
    box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(0,0,0,0.3);
  }

  /* 玉が出る穴 */
  .exit-hole {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 20px;
    background: #1a0a0a;
    border-radius: 0 0 18px 18px;
    border: 3px solid #6B3A1F;
    border-top: none;
    z-index: 4;
  }

  /* 滑り台（スロープ） */
  .slope {
    position: absolute;
    top: 240px;
    left: 50%;
    transform: translateX(-50%) rotate(12deg);
    width: 160px;
    height: 14px;
    background: linear-gradient(to bottom, #c49a5a, #a07830);
    border-radius: 4px;
    border: 2px solid #6B3A1F;
    transform-origin: left center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }

  .slope-end {
    position: absolute;
    top: 253px;
    right: 60px;
    width: 30px;
    height: 18px;
    background: linear-gradient(to bottom, #c49a5a, #a07830);
    border-radius: 0 0 8px 8px;
    border: 2px solid #6B3A1F;
    border-top: none;
  }

  /* 玉受け皿 */
  .tray {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 50px;
    background: linear-gradient(to bottom, #c49a5a, #8B5E3C);
    border-radius: 0 0 20px 20px;
    border: 3px solid #6B3A1F;
    border-top: 2px solid #a07830;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.3), 0 3px 10px rgba(0,0,0,0.3);
  }

  /* ===== 玉 ===== */
  .ball {
    position: absolute;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    z-index: 10;
    opacity: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  }

  .ball.gold {
    background: radial-gradient(circle at 35% 35%, #fff5a0, #ffd700, #b8860b);
  }
  .ball.silver {
    background: radial-gradient(circle at 35% 35%, #fff, #c0c0c0, #808080);
  }
  .ball.special {
    background: radial-gradient(circle at 35% 35%, #f0a0ff, #a020f0, #6a0dad);
  }
  .ball.bronze {
    background: radial-gradient(circle at 35% 35%, #f0c080, #cd7f32, #8b4513);
  }

  .ball .ball-shine {
    position: absolute;
    top: 5px; left: 7px;
    width: 10px; height: 7px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    transform: rotate(-30deg);
  }

  /* 玉アニメーション */
  .ball.anim-drop {
    opacity: 1;
    animation: ballDrop 0.6s ease-in forwards;
  }

  @keyframes ballDrop {
    0%   { top: 200px; left: 152px; opacity: 1; }
    40%  { top: 240px; left: 160px; }
    100% { top: 258px; left: 195px; }
  }

  .ball.anim-roll {
    opacity: 1;
    animation: ballRoll 0.8s ease-out forwards;
  }

  @keyframes ballRoll {
    0%   { top: 258px; left: 195px; transform: rotate(0deg); }
    50%  { top: 300px; left: 180px; transform: rotate(180deg); }
    100% { top: 340px; left: 160px; transform: rotate(360deg); }
  }

  .ball.anim-land {
    opacity: 1;
    animation: ballLand 0.5s cubic-bezier(0.3, 1.5, 0.6, 1) forwards;
  }

  @keyframes ballLand {
    0%   { top: 340px; left: 160px; transform: scale(1); }
    50%  { top: 348px; left: 160px; transform: scale(1.15, 0.85); }
    100% { top: 345px; left: 160px; transform: scale(1); }
  }

  /* 箱の揺れ */
  .box.shaking {
    animation: boxShake 0.08s infinite;
  }

  @keyframes boxShake {
    0%   { transform: translate(2px, 1px) rotate(1deg); }
    25%  { transform: translate(-2px, -1px) rotate(-1deg); }
    50%  { transform: translate(1px, 2px) rotate(0.5deg); }
    75%  { transform: translate(-1px, -2px) rotate(-0.5deg); }
    100% { transform: translate(2px, -1px) rotate(1deg); }
  }

  /* ハンドル回転 */
  .handle-axis.spinning {
    animation: handleSpin 0.3s linear infinite;
  }

  @keyframes handleSpin {
    from { transform: translateY(-50%) rotate(0deg); }
    to   { transform: translateY(-50%) rotate(360deg); }
  }

  /* ===== ボタン ===== */
  .spin-btn {
    padding: 16px 50px;
    font-size: 1.3em;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 5px 25px rgba(255, 65, 108, 0.5);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    z-index: 20;
  }

  .spin-btn:hover:not(:disabled) {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 35px rgba(255, 65, 108, 0.7);
  }

  .spin-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  .spin-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: btnShine 3s infinite;
  }

  @keyframes btnShine {
    0%   { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }

  /* メッセージ */
  .msg {
    color: #ffd700;
    font-size: 1.4em;
    font-weight: bold;
    margin-top: 15px;
    min-height: 45px;
    text-shadow: 0 0 10px #ffd700;
    z-index: 20;
  }

  /* ===== 結果オーバーレイ ===== */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
  }

  .overlay.show { display: flex; animation: fadeIn 0.5s; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .result-card {
    text-align: center;
    padding: 45px 55px;
    border-radius: 20px;
    animation: cardPop 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    max-width: 90vw;
  }

  @keyframes cardPop {
    0%   { transform: scale(0) rotate(-10deg); }
    60%  { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .result-card.silver  { background: linear-gradient(135deg, #b0b0b0, #e8e8e8); box-shadow: 0 0 60px rgba(192,192,192,0.8); }
  .result-card.special { background: linear-gradient(135deg, #e040fb, #7c4dff); box-shadow: 0 0 80px rgba(224,64,251,0.8); }
  .result-card.bronze  { background: linear-gradient(135deg, #cd7f32, #e8a850); box-shadow: 0 0 40px rgba(205,127,50,0.6); }

  .r-emoji { font-size: 4em; margin-bottom: 10px; animation: emojiPop 0.8s ease-out 0.3s both; }

  @keyframes emojiPop {
    0%   { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .r-title { font-size: 2.5em; font-weight: bold; margin-bottom: 5px; }
  .result-card.silver .r-title  { color: #333; }
  .result-card.special .r-title { color: #fff; }
  .result-card.bronze .r-title  { color: #4a2800; }

  .r-sub { font-size: 1.1em; margin-bottom: 20px; opacity: 0.8; }
  .result-card.special .r-sub { color: #eee; }

  .close-btn {
    padding: 12px 35px;
    font-size: 1em;
    border: 2px solid rgba(0,0,0,0.3);
    background: rgba(255,255,255,0.3);
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.5); }

  /* 紙吹雪 */
  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 99;
  }

  /* 中のカラカラ玉たち */
  .inner-balls {
    position: absolute;
    top: 10px; left: 10px;
    width: 140px; height: 140px;
    z-index: 1;
    pointer-events: none;
  }

  .inner-ball {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    opacity: 0.85;
  }

  .box.shaking .inner-ball {
    animation: innerBounce 0.12s infinite;
  }

  @keyframes innerBounce {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(3px, -4px); }
    50%  { transform: translate(-2px, 3px); }
    75%  { transform: translate(4px, 2px); }
    100% { transform: translate(-3px, -2px); }
  }

  /* 効果パーティクル */
  .sparkle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 30;
    opacity: 0;
  }

  .sparkle.pop {
    animation: sparklePop 0.8s ease-out forwards;
  }

  @keyframes sparklePop {
    0%   { opacity: 1; transform: scale(0) translate(0, 0); }
    100% { opacity: 0; transform: scale(1.5) translate(var(--tx), var(--ty)); }
  }

  /* near miss */
  .near-miss {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 60;
    font-size: 2.5em;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00;
    pointer-events: none;
  }

  .near-miss.show {
    display: block;
    animation: nearMiss 1.2s ease-out forwards;
  }

  @keyframes nearMiss {
    0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
    30%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
    60%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
  }

  .flash {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50;
    pointer-events: none;
  }

  .flash.active {
    display: block;
    animation: flashAnim 0.2s;
  }

  @keyframes flashAnim {
    0%   { background: rgba(255,255,255,0.5); }
    100% { background: transparent; }
  }

  /* カラカラ音テキスト */
  .karakara-text {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.5em;
    font-weight: bold;
    color: #ff8c00;
    opacity: 0;
    pointer-events: none;
    z-index: 25;
  }

  .karakara-text.show {
    animation: karkaraFloat 1.5s ease-out forwards;
  }

  @keyframes karkaraFloat {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
  }
</style>
</head>
<body>

<h1>🎊 ガラガラ福引き 🎊</h1>
<p class="sub">✨ ハンドルを回して運試し！ ✨</p>

<div class="galagala" id="galagala">
  <!-- 脚 -->
  <div class="stand-leg-l"></div>
  <div class="stand-leg-r"></div>

  <!-- 箱 -->
  <div class="box-container">
    <div class="box" id="box">
      <div class="box-body">
        <div class="inner-balls" id="innerBalls"></div>
      </div>
      <div class="band-h"></div>
      <div class="band-v"></div>
      <div class="exit-hole"></div>

      <!-- ハンドル -->
      <div class="handle-axis" id="handle">
        <div class="handle-knob"></div>
      </div>
    </div>
  </div>

  <!-- スロープ -->
  <div class="slope"></div>
  <div class="slope-end"></div>

  <!-- 皿 -->
  <div class="tray"></div>

  <!-- 台 -->
  <div class="stand"></div>

  <!-- 出てくる玉 -->
  <div class="ball" id="resultBall"><div class="ball-shine"></div></div>
</div>

<button class="spin-btn" id="spinBtn" onclick="doGalagala()">🎲 ガラガラ回す！</button>
<div class="msg" id="msg"></div>

<div class="near-miss" id="nearMiss"></div>
<div class="flash" id="flash"></div>
<canvas id="confetti"></canvas>

<div class="overlay" id="overlay">
  <div class="result-card" id="resultCard">
    <div class="r-emoji" id="rEmoji"></div>
    <div class="r-title" id="rTitle"></div>
    <div class="r-sub" id="rSub"></div>
    <button class="close-btn" onclick="closeResult()">もう一回！</button>
  </div>
</div>

<script>
// 中の玉を描画
const innerBalls = document.getElementById('innerBalls');
const ballColors = ['#ffd700','#c0c0c0','#cd7f32','#a020f0','#ffd700','#c0c0c0','#cd7f32','#cd7f32','#c0c0c0','#cd7f32'];
ballColors.forEach((c, i) => {
  const b = document.createElement('div');
  b.className = 'inner-ball';
  b.style.background = `radial-gradient(circle at 35% 35%, ${lighten(c)}, ${c})`;
  b.style.left = (15 + Math.random() * 100) + 'px';
  b.style.top = (15 + Math.random() * 100) + 'px';
  b.style.animationDelay = (Math.random() * 0.1) + 's';
  innerBalls.appendChild(b);
});

function lighten(hex) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + 80);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + 80);
  const bb = Math.min(255, parseInt(hex.slice(5,7),16) + 80);
  return `rgb(${r},${g},${bb})`;
}

// 確率: 金0%, 銀30%, 特別10%, 銅60%
function pickResult() {
  const r = Math.random() * 100;
  if (r < 30) return 'silver';
  if (r < 40) return 'special';
  return 'bronze';
}

let busy = false;
const box = document.getElementById('box');
const handle = document.getElementById('handle');
const ball = document.getElementById('resultBall');
const msg = document.getElementById('msg');
const spinBtn = document.getElementById('spinBtn');

// 音
let audioCtx;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playKara() {
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = 200 + Math.random() * 300;
    o.type = 'triangle'; g.gain.value = 0.06;
    o.start(); o.stop(c.currentTime + 0.04);
  } catch(e) {}
}

function playPon() {
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value = 600; o.type = 'sine';
    g.gain.value = 0.12;
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.4);
    o.start(); o.stop(c.currentTime + 0.4);
  } catch(e) {}
}

function playRoll() {
  try {
    const c = ac();
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = 300 + i * 50;
        o.type = 'sine'; g.gain.value = 0.04;
        o.start(); o.stop(c.currentTime + 0.08);
      }, i * 80);
    }
  } catch(e) {}
}

function playFanfare() {
  try {
    const c = ac();
    [523,659,784,1047].forEach((f,i) => {
      setTimeout(() => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = f; o.type = 'sine';
        g.gain.value = 0.08;
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.5);
        o.start(); o.stop(c.currentTime + 0.5);
      }, i * 180);
    });
  } catch(e) {}
}

function playDrumRoll() {
  try {
    const c = ac();
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = 80 + Math.random() * 80;
        o.type = 'triangle'; g.gain.value = 0.04;
        o.start(); o.stop(c.currentTime + 0.04);
      }, i * 40);
    }
  } catch(e) {}
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showKarakara() {
  const el = document.createElement('div');
  el.className = 'karakara-text show';
  el.textContent = ['ガラ', 'カラ', 'ガラッ', 'カラカラ'][Math.floor(Math.random()*4)];
  document.getElementById('galagala').appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function spawnSparkles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle pop';
    s.style.background = color;
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const angle = (Math.PI * 2 / 12) * i;
    const dist = 30 + Math.random() * 40;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.getElementById('galagala').appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

async function doGalagala() {
  if (busy) return;
  busy = true;
  spinBtn.disabled = true;
  msg.textContent = '';

  // リセット玉
  ball.className = 'ball';
  ball.style.opacity = '0';

  const result = pickResult();

  // ---- Phase 1: ガラガラ回す ----
  msg.textContent = 'ガラガラガラ…！';
  handle.classList.add('spinning');
  box.classList.add('shaking');

  let karaInterval = setInterval(() => {
    playKara();
    showKarakara();
  }, 200);

  // ニアミス演出（1.5秒後に金色チラ見せ）
  setTimeout(() => {
    const nm = document.getElementById('nearMiss');
    nm.textContent = '✨金色の玉が見えた…!?✨';
    nm.classList.add('show');
    const fl = document.getElementById('flash');
    fl.classList.add('active');
    setTimeout(() => { fl.classList.remove('active'); }, 200);
    setTimeout(() => nm.classList.remove('show'), 1200);
  }, 1500);

  await sleep(3000);

  // ---- Phase 2: 減速 ----
  clearInterval(karaInterval);
  handle.classList.remove('spinning');

  // ゆっくりガタガタ
  msg.textContent = 'コロコロ…';
  let slowCount = 0;
  const slowInterval = setInterval(() => {
    playKara();
    slowCount++;
    if (slowCount >= 5) clearInterval(slowInterval);
  }, 400);

  await sleep(2000);
  box.classList.remove('shaking');

  // ---- Phase 3: 玉が出る！ ----
  msg.textContent = '…！！';
  playPon();
  await sleep(400);

  // 玉の色セット
  ball.classList.remove('gold','silver','special','bronze');
  ball.classList.add(result);

  // Drop animation
  ball.classList.add('anim-drop');
  playRoll();
  await sleep(600);

  // Roll animation
  ball.className = `ball ${result} anim-roll`;
  await sleep(800);

  // Land animation
  ball.className = `ball ${result} anim-land`;
  await sleep(500);

  // スパークル
  const ballColors2 = {
    gold: '#ffd700', silver: '#c0c0c0', special: '#a020f0', bronze: '#cd7f32'
  };
  spawnSparkles(160, 345, ballColors2[result]);

  // ---- Phase 4: ドラムロール演出 ----
  msg.textContent = '';
  await sleep(300);
  playDrumRoll();
  msg.textContent = 'ドキドキ…';
  await sleep(800);
  msg.textContent = 'ドキドキドキ…！';
  await sleep(800);

  // フラッシュ
  const fl = document.getElementById('flash');
  fl.classList.add('active');
  setTimeout(() => fl.classList.remove('active'), 200);

  msg.textContent = '結果は───！';
  await sleep(1000);

  // ---- Phase 5: 結果発表 ----
  msg.textContent = '';
  playFanfare();
  showResult(result);

  busy = false;
  spinBtn.disabled = false;
}

function showResult(result) {
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('resultCard');
  card.className = 'result-card ' + result;

  const data = {
    silver:  { emoji: '✨🥈✨', title: '🎉 銀 賞 🎉', sub: 'すごい！銀の玉が出た！おめでとう！' },
    special: { emoji: '🌟💫🌟', title: '⚡ 特 別 賞 ⚡', sub: '紫の玉！スペシャルな何かが…！？' },
    bronze:  { emoji: '🎊🥉🎊', title: '🏅 銅 賞 🏅', sub: '銅の玉ゲット！次はもっと上を！' },
  };

  const d = data[result];
  document.getElementById('rEmoji').textContent = d.emoji;
  document.getElementById('rTitle').textContent = d.title;
  document.getElementById('rSub').textContent = d.sub;
  overlay.classList.add('show');

  if (result !== 'bronze') launchConfetti();
}

function closeResult() {
  document.getElementById('overlay').classList.remove('show');
  msg.textContent = '';
  stopConfetti();
  // 玉リセット
  ball.className = 'ball';
  ball.style.opacity = '0';
}

// ===== 紙吹雪 =====
const cc = document.getElementById('confetti');
const cctx = cc.getContext('2d');
let confPieces = [], confAnim;

function resizeCC() { cc.width = innerWidth; cc.height = innerHeight; }
addEventListener('resize', resizeCC);
resizeCC();

function launchConfetti() {
  confPieces = [];
  for (let i = 0; i < 150; i++) {
    confPieces.push({
      x: Math.random() * cc.width,
      y: -20 - Math.random() * cc.height,
      w: 5 + Math.random() * 8,
      h: 10 + Math.random() * 8,
      color: `hsl(${Math.random()*360},85%,60%)`,
      speed: 2 + Math.random() * 4,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      drift: (Math.random() - 0.5) * 2,
    });
  }
  animConf();
}

function animConf() {
  cctx.clearRect(0, 0, cc.width, cc.height);
  confPieces.forEach(p => {
    p.y += p.speed; p.x += p.drift; p.angle += p.spin;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.angle);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    cctx.restore();
  });
  confAnim = requestAnimationFrame(animConf);
}

function stopConfetti() {
  cancelAnimationFrame(confAnim);
  cctx.clearRect(0, 0, cc.width, cc.height);
  confPieces = [];
}
</script>
